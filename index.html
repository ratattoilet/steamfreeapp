<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steam Free Deals</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg-color: #121212; --card-bg: #2b2d31; --text-main: #f2f3f5;
            --text-muted: #b5bac1; --accent: #5865F2; --magic-1: #1a0b2e; --magic-2: #240046;
        }
        :root[data-theme="light"] {
            --bg-color: #f2f3f5; --card-bg: #ffffff; --text-main: #060607;
            --text-muted: #4e5058; --accent: #5865F2; --magic-1: #e0c3fc; --magic-2: #bbd0ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .magic-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--magic-1), var(--magic-2), transparent 60%);
            animation: breathe 15s infinite alternate; z-index: -1; opacity: 0.5;
        }
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { background: var(--card-bg); border: 1px solid var(--text-muted); color: var(--text-main); padding: 8px 15px; border-radius: 15px; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; border: none; width: 100%; margin-top: 10px; padding: 10px; font-weight: bold; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card img { width: 100px; height: 45px; border-radius: 4px; object-fit: cover; }
        .card-info { flex: 1; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: var(--accent); }
        .price { font-size: 14px; color: #43b581; font-weight: bold; }
        .old-price { text-decoration: line-through; color: var(--text-muted); font-size: 12px; margin-left: 5px; }
        .loading { text-align: center; padding: 50px; font-weight: bold; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="magic-bg"></div>
    <div class="container">
        <header class="header">
            <h2># free-promotions</h2>
            <div style="display:flex; gap:8px;">
                <button class="btn" onclick="fetchDeals()">🔄</button>
                <button class="btn" id="themeBtn">🌓</button>
            </div>
        </header>
        <div id="feed">
            <div class="loading">Шукаємо халяву...</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Тема
        document.getElementById('themeBtn').onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };

        async function fetchDeals() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '<div class="loading">Синхронізація зі Steam...</div>';
            
            try {
                // Запитуємо всі ігри, де знижка становить 100%
                const response = await fetch('https://www.cheapshark.com/api/1.0/deals?storeID=1&onSale=1');
                const deals = await response.json();
                
                // Фільтруємо лише ті, де ціна реально 0
                const freeDeals = deals.filter(deal => parseFloat(deal.price) === 0);

                feed.innerHTML = '';
                if (!freeDeals.length) {
                    feed.innerHTML = '<div class="loading">CheapShark ще не оновив базу. <br> Спробуйте оновити через 10-15 хвилин!</div>';
                    return;
                }

                freeDeals.forEach(deal => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <img src="${deal.thumb}" alt="game thumb">
                            <div class="card-info">
                                <div class="card-title">${deal.title}</div>
                                <div class="price">БЕЗКОШТОВНО <span class="old-price">$${deal.normalPrice}</span></div>
                            </div>
                        </div>
                        <button class="btn-primary" onclick="tg.openLink('https://www.cheapshark.com/redirect?dealID=${deal.dealID}')">Забрати в Steam</button>
                    `;
                    feed.appendChild(card);
                });
            } catch (e) {
                feed.innerHTML = '<div class="loading">Помилка зв\'язку з сервером.</div>';
            }
        }

        fetchDeals();
    </script>
</body>
</html>
