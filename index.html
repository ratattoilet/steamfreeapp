<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steam Free Promotions</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #2b2d31;
            --text-main: #f2f3f5;
            --text-muted: #b5bac1;
            --accent: #5865F2;
            --accent-hover: #4752C4;
            --magic-color-1: #1a0b2e;
            --magic-color-2: #240046;
            --magic-color-3: #10002b;
        }

        :root[data-theme="light"] {
            --bg-color: #f2f3f5;
            --card-bg: #ffffff;
            --text-main: #060607;
            --text-muted: #4e5058;
            --accent: #5865F2;
            --accent-hover: #4752C4;
            --magic-color-1: #e0c3fc;
            --magic-color-2: #c8b6ff;
            --magic-color-3: #bbd0ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .magic-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, var(--magic-color-1), var(--magic-color-2), transparent 60%),
                        radial-gradient(circle at 80% 20%, var(--magic-color-3), transparent 50%);
            animation: breathe 15s ease-in-out infinite alternate;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes breathe {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, 2%); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 14px;
        }

        .btn:hover {
            border-color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: transparent;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            gap: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-img {
            width: 120px;
            height: auto;
            border-radius: 4px;
            object-fit: cover;
        }

        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            color: var(--accent);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            text-decoration: none;
            cursor: pointer;
        }

        .card-title:hover {
            text-decoration: underline;
        }

        .card-type {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .card-type span {
            color: var(--text-muted);
            font-weight: normal;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .meta-block strong {
            display: block;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: bold;
        }

        @media (max-width: 500px) {
            .card {
                flex-direction: column;
            }
            .card-img {
                width: 100%;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="magic-bg"></div>
    <div class="container">
        <header class="header">
            <h1># free-promotions</h1>
            <div class="controls">
                <button class="btn" id="refreshBtn">🔄 Оновити</button>
                <button class="btn" id="themeBtn">🌓 Тема</button>
            </div>
        </header>

        <main class="feed" id="gamesFeed">
            <div class="loading">Завантаження магічних знижок...</div>
        </main>
    </div>

    <script>
        // Ініціалізація Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Елементи DOM
        const themeBtn = document.getElementById('themeBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const htmlDoc = document.documentElement;
        const feed = document.getElementById('gamesFeed');

        // Встановлення теми з Telegram
        if (tg.colorScheme === 'light') {
            htmlDoc.setAttribute('data-theme', 'light');
        }

        // Ручне перемикання теми
        themeBtn.addEventListener('click', () => {
            const currentTheme = htmlDoc.getAttribute('data-theme');
            htmlDoc.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Безпечне відкриття посилань у Telegram
        function openLink(url) {
            if (tg.openLink) {
                tg.openLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        // Завантаження даних
        async function fetchGames() {
            feed.innerHTML = '<div class="loading">Оновлення списку...</div>';
            
            try {
                // Додаємо timestamp, щоб уникнути кешування браузером
                const response = await fetch(`https://www.gamerpower.com/api/giveaways?platform=steam&type=game&_t=${new Date().getTime()}`);
                const games = await response.json();
                
                feed.innerHTML = '';

                if(games.length === 0) {
                    feed.innerHTML = '<div class="loading">Наразі немає безкоштовних ігор :(</div>';
                    return;
                }

                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const endDate = game.end_date === "N/A" ? "Невідомо" : new Date(game.end_date).toLocaleDateString('uk-UA');

                    card.innerHTML = `
                        <img src="${game.thumbnail}" alt="${game.title}" class="card-img">
                        <div class="card-content">
                            <div class="card-title" onclick="openLink('${game.open_giveaway_url}')">${game.title}</div>
                            <div class="card-type">
                                Free To Keep (Game) <span>(Steam)</span>
                            </div>
                            <div class="card-meta">
                                <div class="meta-block">
                                    <strong>Publisher</strong>
                                    Офіційна роздача
                                </div>
                                <div class="meta-block">
                                    <strong>Offer ends</strong>
                                    ${endDate}
                                </div>
                                <div class="meta-block">
                                    <strong>Value</strong>
                                    <del>${game.worth}</del>
                                </div>
                            </div>
                            <button class="btn btn-primary" onclick="openLink('${game.open_giveaway_url}')">Відкрити сторінку</button>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            } catch (error) {
                feed.innerHTML = '<div class="loading">Помилка завантаження даних. Перевірте з\'єднання.</div>';
            }
        }

        // Біндимо кнопку оновлення
        refreshBtn.addEventListener('click', fetchGames);

        // Перший запуск
        fetchGames();
    </script>
</body>
</html>
