<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Benini Ninja</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-purple: #b100ff;
    --neon-gold: #ffd700;
    --neon-green: #00ff88;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.12);
    --dark: #050510;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

  body {
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  /* ===== SCREENS ===== */
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity .35s, transform .35s; }
  .screen.hidden { opacity:0; pointer-events:none; transform:scale(0.95); }

  /* BG grid */
  body::before {
    content:''; position:fixed; inset:0; z-index:0;
    background:
      linear-gradient(rgba(0,245,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
  }
  body::after {
    content:''; position:fixed; inset:0; z-index:0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(177,0,255,.15) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0,245,255,.1) 0%, transparent 60%);
    pointer-events:none;
  }

  /* ===== MENU ===== */
  #menu { z-index:10; }
  .logo-wrap { text-align:center; margin-bottom:30px; }
  .logo-title {
    font-family:'Orbitron', monospace; font-size:clamp(28px,8vw,52px); font-weight:900;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    filter: drop-shadow(0 0 20px rgba(0,245,255,.6));
    letter-spacing:2px; line-height:1.1;
  }
  .logo-sub {
    font-family:'Orbitron', monospace; font-size:clamp(10px,3vw,14px); color:var(--neon-gold);
    letter-spacing:6px; margin-top:6px; opacity:.85;
    text-shadow: 0 0 12px var(--neon-gold);
  }

  .blade-preview {
    width:100px; height:100px; margin:0 auto 20px;
    position:relative; display:flex; align-items:center; justify-content:center;
  }
  .blade-preview canvas { width:100%; height:100%; }

  .menu-btn {
    width:240px; padding:14px 24px; margin:8px 0;
    border-radius:14px; border:1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    color:#fff; font-family:'Orbitron', monospace; font-size:14px; font-weight:700;
    letter-spacing:2px; cursor:pointer;
    position:relative; overflow:hidden;
    transition: transform .15s, box-shadow .15s;
  }
  .menu-btn::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(0,245,255,.15), rgba(177,0,255,.1));
    opacity:0; transition:opacity .2s;
  }
  .menu-btn:active { transform:scale(0.96); }
  .menu-btn:hover::before { opacity:1; }
  .menu-btn.primary { border-color:var(--neon-cyan); box-shadow:0 0 20px rgba(0,245,255,.25), inset 0 0 20px rgba(0,245,255,.05); }
  .menu-btn.gold { border-color:var(--neon-gold); box-shadow:0 0 20px rgba(255,215,0,.25), inset 0 0 20px rgba(255,215,0,.05); color:var(--neon-gold); }
  .menu-btn.purple { border-color:var(--neon-purple); box-shadow:0 0 20px rgba(177,0,255,.25); }

  .coin-display {
    display:flex; align-items:center; gap:8px;
    background: rgba(255,215,0,.08); border:1px solid rgba(255,215,0,.3);
    border-radius:30px; padding:8px 18px; margin:12px 0;
    font-family:'Orbitron', monospace; font-size:13px; color:var(--neon-gold);
    text-shadow:0 0 10px var(--neon-gold);
    box-shadow:0 0 15px rgba(255,215,0,.15);
  }
  .coin-icon { font-size:18px; }

  /* ===== GAME SCREEN ===== */
  #game { z-index:5; }
  #gameCanvas {
    position:absolute; inset:0; width:100%; height:100%;
    touch-action:none;
  }

  .hud {
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 16px 10px;
    background:linear-gradient(to bottom, rgba(5,5,16,.8), transparent);
    z-index:20; pointer-events:none;
  }
  .hud-score {
    font-family:'Orbitron', monospace; font-size:clamp(16px,5vw,22px); font-weight:900;
    color:var(--neon-cyan); text-shadow:0 0 15px var(--neon-cyan);
  }
  .hud-coins {
    font-family:'Orbitron', monospace; font-size:clamp(12px,3.5vw,15px);
    color:var(--neon-gold); text-shadow:0 0 10px var(--neon-gold);
    display:flex; align-items:center; gap:5px;
  }
  .hud-lives { display:flex; gap:5px; }
  .heart { font-size:18px; transition:transform .3s; }
  .heart.lost { opacity:.2; transform:scale(0.7); }

  .pause-btn {
    position:absolute; bottom:20px; right:16px; z-index:20;
    width:44px; height:44px; border-radius:12px;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    backdrop-filter:blur(10px); color:#fff; font-size:18px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  /* combo flash */
  .combo-flash {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Orbitron', monospace; font-size:clamp(24px,8vw,48px); font-weight:900;
    pointer-events:none; z-index:30; text-align:center;
    opacity:0; animation:comboAnim .7s ease-out forwards;
  }
  @keyframes comboAnim {
    0%{opacity:0;transform:translate(-50%,-60%) scale(.5);}
    30%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-40%) scale(.9);}
  }

  /* ===== GAME OVER ===== */
  #gameover { z-index:15; }
  .go-panel {
    background:rgba(5,5,16,.85); border:1px solid var(--glass-border);
    border-radius:24px; padding:32px 28px; width:min(320px,90vw); text-align:center;
    backdrop-filter:blur(30px);
    box-shadow:0 0 60px rgba(255,0,110,.2), inset 0 0 40px rgba(0,0,0,.4);
  }
  .go-title {
    font-family:'Orbitron', monospace; font-size:clamp(22px,7vw,32px); font-weight:900;
    color:var(--neon-pink); text-shadow:0 0 20px var(--neon-pink);
    margin-bottom:20px;
  }
  .go-stat { color:rgba(255,255,255,.7); font-size:15px; margin:6px 0; }
  .go-stat span { color:#fff; font-weight:700; }
  .go-earned { color:var(--neon-gold); font-size:17px; margin:14px 0; font-weight:700; }

  /* ===== SHOP ===== */
  #shop { z-index:10; }
  .shop-header {
    font-family:'Orbitron', monospace; font-size:clamp(18px,5vw,26px); font-weight:900;
    color:var(--neon-cyan); text-shadow:0 0 15px var(--neon-cyan);
    margin-bottom:6px; text-align:center;
  }
  .shop-sub { color:rgba(255,255,255,.5); font-size:13px; margin-bottom:20px; text-align:center; }

  .blade-grid {
    display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
    width:min(360px,96vw); max-height:55vh; overflow-y:auto;
    padding:4px; scrollbar-width:none;
  }
  .blade-grid::-webkit-scrollbar { display:none; }

  .blade-card {
    background:var(--glass-bg); border:1px solid var(--glass-border);
    border-radius:14px; padding:14px 12px; text-align:center;
    cursor:pointer; transition:transform .15s, box-shadow .2s;
    position:relative; overflow:hidden;
  }
  .blade-card:active { transform:scale(.97); }
  .blade-card.equipped { border-color:var(--neon-cyan); box-shadow:0 0 20px rgba(0,245,255,.3); }
  .blade-card.locked { opacity:.7; }

  .blade-card-canvas { width:60px; height:60px; display:block; margin:0 auto 8px; }
  .blade-name { font-size:13px; font-weight:700; color:#fff; margin-bottom:3px; }
  .blade-rarity { font-size:10px; letter-spacing:1px; font-family:'Orbitron', monospace; }
  .blade-price { font-size:11px; color:var(--neon-gold); margin-top:5px; }
  .blade-badge {
    position:absolute; top:8px; right:8px; font-size:10px;
    background:rgba(0,245,255,.2); border:1px solid var(--neon-cyan);
    border-radius:6px; padding:2px 6px; color:var(--neon-cyan);
    font-family:'Orbitron', monospace;
  }

  .rarity-common { color:#aaa; }
  .rarity-uncommon { color:var(--neon-green); }
  .rarity-rare { color:#4fc3ff; }
  .rarity-epic { color:var(--neon-purple); }
  .rarity-legendary { color:var(--neon-gold); }

  /* ===== CASES ===== */
  #cases { z-index:10; }
  .case-grid { display:flex; flex-direction:column; gap:14px; width:min(320px,90vw); }
  .case-card {
    background:var(--glass-bg); border:1px solid var(--glass-border);
    border-radius:18px; padding:18px; display:flex; align-items:center; gap:16px;
    cursor:pointer; transition:transform .15s;
    backdrop-filter:blur(10px);
  }
  .case-card:active { transform:scale(.97); }
  .case-icon { font-size:40px; filter:drop-shadow(0 0 10px currentColor); flex-shrink:0; }
  .case-info h3 { font-family:'Orbitron', monospace; font-size:14px; font-weight:700; color:#fff; margin-bottom:4px; }
  .case-info p { font-size:12px; color:rgba(255,255,255,.5); }
  .case-price { margin-left:auto; text-align:right; flex-shrink:0; }
  .case-price span { font-family:'Orbitron', monospace; font-size:15px; color:var(--neon-gold); font-weight:700; text-shadow:0 0 8px var(--neon-gold); }

  /* Case open overlay */
  #caseOpen {
    position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.9);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    backdrop-filter:blur(20px);
  }
  #caseOpen.hidden { display:none; }
  .case-reveal {
    text-align:center; animation:revealPop .6s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes revealPop {
    0%{opacity:0;transform:scale(.3) rotate(-10deg);}
    100%{opacity:1;transform:scale(1) rotate(0deg);}
  }
  .case-reveal h2 {
    font-family:'Orbitron', monospace; font-size:clamp(16px,5vw,24px);
    margin-top:16px; color:#fff;
  }
  .case-reveal p { color:rgba(255,255,255,.6); margin:6px 0 20px; font-size:14px; }
  .reveal-canvas { width:120px; height:120px; display:block; margin:0 auto; }

  /* Back btn */
  .back-btn {
    position:absolute; top:16px; left:16px; z-index:20;
    width:40px; height:40px; border-radius:10px;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    backdrop-filter:blur(10px); color:#fff; font-size:20px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  /* floating coins anim */
  .float-coin {
    position:fixed; pointer-events:none; z-index:100;
    font-family:'Orbitron', monospace; font-size:14px; font-weight:700;
    color:var(--neon-gold); text-shadow:0 0 10px var(--neon-gold);
    animation:floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0%{opacity:1;transform:translateY(0) scale(1);}
    100%{opacity:0;transform:translateY(-80px) scale(.8);}
  }

  /* Score popup */
  .score-pop {
    position:fixed; pointer-events:none; z-index:99;
    font-family:'Orbitron', monospace; font-size:clamp(14px,4vw,20px); font-weight:900;
    animation:scorePop 0.8s ease-out forwards;
  }
  @keyframes scorePop {
    0%{opacity:1;transform:translateY(0) scale(1);}
    100%{opacity:0;transform:translateY(-60px) scale(.7);}
  }

  .neon-divider {
    width:200px; height:1px; margin:12px auto;
    background:linear-gradient(to right, transparent, var(--neon-cyan), var(--neon-purple), transparent);
    opacity:.5;
  }
</style>
</head>
<body>

<!-- ============ MENU ============ -->
<div id="menu" class="screen">
  <div class="logo-wrap">
    <div class="logo-title">BENINI<br>NINJA</div>
    <div class="logo-sub">⚡ NEON BLADE ⚡</div>
  </div>
  <canvas id="menuBladeCanvas" width="120" height="120" style="width:120px;height:120px;margin-bottom:16px;"></canvas>
  <div class="coin-display">
    <span class="coin-icon">🪙</span>
    <span id="menuCoinCount">0</span> Benini Coins
  </div>
  <button class="menu-btn primary" onclick="startGame()">▶ ГРАТИ</button>
  <button class="menu-btn gold" onclick="showScreen('cases')">📦 КЕЙСИ</button>
  <button class="menu-btn purple" onclick="showScreen('shop')">⚔️ КЛИНКИ</button>
  <div class="neon-divider"></div>
  <div style="color:rgba(255,255,255,.35);font-size:11px;font-family:'Orbitron',monospace;letter-spacing:2px;">v1.0 — BENINI STUDIO</div>
</div>

<!-- ============ GAME ============ -->
<div id="game" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
  <div class="hud">
    <div class="hud-score">
      <div style="font-size:10px;opacity:.6;letter-spacing:2px;margin-bottom:2px;">SCORE</div>
      <div id="scoreDisplay">0</div>
    </div>
    <div class="hud-lives" id="livesDisplay"></div>
    <div class="hud-coins">🪙 <span id="sessionCoins">0</span></div>
  </div>
  <button class="pause-btn" onclick="togglePause()">⏸</button>
</div>

<!-- ============ GAME OVER ============ -->
<div id="gameover" class="screen hidden">
  <div class="go-panel">
    <div class="go-title">GAME OVER</div>
    <div class="neon-divider"></div>
    <div class="go-stat">Рахунок: <span id="finalScore">0</span></div>
    <div class="go-stat">Зрізано фруктів: <span id="finalFruits">0</span></div>
    <div class="go-stat">Макс. комбо: <span id="finalCombo">0</span>x</div>
    <div class="go-earned">🪙 +<span id="earnedCoins">0</span> Benini Coins</div>
    <div class="neon-divider"></div>
    <button class="menu-btn primary" onclick="startGame()" style="width:100%;margin:6px 0;">▶ ЩЕ РАЗ</button>
    <button class="menu-btn" onclick="showScreen('menu')" style="width:100%;margin:6px 0;">🏠 МЕНЮ</button>
  </div>
</div>

<!-- ============ SHOP ============ -->
<div id="shop" class="screen hidden">
  <button class="back-btn" onclick="showScreen('menu')">←</button>
  <div class="shop-header">⚔️ КЛИНКИ</div>
  <div class="shop-sub">Обери свій стиль бою</div>
  <div class="coin-display" style="margin-bottom:16px;">
    🪙 <span id="shopCoinCount">0</span> Benini Coins
  </div>
  <div class="blade-grid" id="bladeGrid"></div>
</div>

<!-- ============ CASES ============ -->
<div id="cases" class="screen hidden">
  <button class="back-btn" onclick="showScreen('menu')">←</button>
  <div class="shop-header" style="margin-top:20px;">📦 КЕЙСИ</div>
  <div class="shop-sub">Відкрий унікальний клинок</div>
  <div class="coin-display" style="margin-bottom:16px;">
    🪙 <span id="casesCoinCount">0</span> Benini Coins
  </div>
  <div class="case-grid" id="caseGrid"></div>
</div>

<!-- ============ CASE OPEN ============ -->
<div id="caseOpen" class="hidden">
  <div class="case-reveal" id="caseReveal">
    <canvas class="reveal-canvas" id="revealCanvas" width="240" height="240"></canvas>
    <h2 id="revealName">—</h2>
    <p id="revealRarity">—</p>
    <button class="menu-btn primary" onclick="closeCaseReveal()" style="width:220px;">✓ ЗАБРАТИ</button>
  </div>
</div>

<script>
// ========== STATE ==========
const SAVE_KEY = 'benini_save';
let state = { coins:0, ownedBlades:['plasma'], equippedBlade:'plasma', highScore:0 };

function saveState() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if(s) state = {...state,...s}; } catch(e){}
}
loadState();

// ========== BLADES ==========
const BLADES = [
  { id:'plasma',    name:'Plasma Edge',   rarity:'common',    price:0,     color:'#00f5ff', glow:'#00f5ff', trail:'cyan',    effect:'none',     icon:'⚡' },
  { id:'crimson',   name:'Crimson Fang',  rarity:'uncommon',  price:150,   color:'#ff3366', glow:'#ff0044', trail:'red',     effect:'sparks',   icon:'🔥' },
  { id:'emerald',   name:'Emerald Viper', rarity:'uncommon',  price:200,   color:'#00ff88', glow:'#00ff44', trail:'green',   effect:'leaves',   icon:'🌿' },
  { id:'phantom',   name:'Phantom Void',  rarity:'rare',      price:400,   color:'#b100ff', glow:'#8800cc', trail:'purple',  effect:'shadow',   icon:'👻' },
  { id:'solar',     name:'Solar Fury',    rarity:'rare',      price:500,   color:'#ffaa00', glow:'#ff8800', trail:'orange',  effect:'fire',     icon:'☀️' },
  { id:'frost',     name:'Frost Shard',   rarity:'epic',      price:800,   color:'#aaddff', glow:'#88ccff', trail:'ice',     effect:'ice',      icon:'❄️' },
  { id:'thunder',   name:'Thunder God',   rarity:'epic',      price:900,   color:'#ffe600', glow:'#ffcc00', trail:'yellow',  effect:'electric', icon:'⚡' },
  { id:'shadow',    name:'Shadow Reaper', rarity:'epic',      price:1000,  color:'#ff00aa', glow:'#cc0088', trail:'pink',    effect:'dark',     icon:'💀' },
  { id:'cosmic',    name:'Cosmic Rift',   rarity:'legendary', price:1500,  color:'#ffffff', glow:'#aaaaff', trail:'rainbow', effect:'stars',    icon:'🌌' },
  { id:'benini',    name:'Benini Prime',  rarity:'legendary', price:2000,  color:'#ffd700', glow:'#ffaa00', trail:'gold',    effect:'coins',    icon:'👑' },
];

const RARITY_COLOR = { common:'#aaa', uncommon:'#00ff88', rare:'#4fc3ff', epic:'#b100ff', legendary:'#ffd700' };

// ========== CASES ==========
const CASES = [
  { id:'basic',  name:'Basic Case',   price:100, icon:'📦', color:'#4fc3ff', pool:['common','uncommon'] },
  { id:'pro',    name:'Pro Case',     price:300, icon:'💎', color:'#b100ff', pool:['uncommon','rare','epic'] },
  { id:'elite',  name:'Elite Case',   price:600, icon:'👑', color:'#ffd700', pool:['rare','epic','legendary'] },
];

// ========== UTILS ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if(id==='menu') { updateMenuUI(); drawMenuBlade(); }
  if(id==='shop') renderShop();
  if(id==='cases') renderCases();
}

function updateMenuUI() {
  document.getElementById('menuCoinCount').textContent = state.coins;
  document.getElementById('shopCoinCount').textContent = state.coins;
  document.getElementById('casesCoinCount').textContent = state.coins;
}

function spawnFloatText(x, y, text, color='#ffd700') {
  const el = document.createElement('div');
  el.className = 'float-coin';
  el.style.left = x+'px'; el.style.top = y+'px'; el.style.color = color;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1200);
}

// ========== BLADE DRAWING ==========
function getBladeData(id) { return BLADES.find(b=>b.id===id)||BLADES[0]; }

function drawBlade(ctx, blade, cx, cy, size, time=0) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.sin(time*0.003)*0.15);
  const c = blade.color, g = blade.glow;

  // Glow aura
  const aura = ctx.createRadialGradient(0,0,0,0,0,size*.7);
  aura.addColorStop(0, g+'33'); aura.addColorStop(1, 'transparent');
  ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(0,0,size*.7,0,Math.PI*2); ctx.fill();

  // Handle
  const hGrad = ctx.createLinearGradient(-size*.08,-size*.4,-size*.08,size*.45);
  hGrad.addColorStop(0,'#333'); hGrad.addColorStop(.5,'#666'); hGrad.addColorStop(1,'#222');
  ctx.fillStyle = hGrad;
  roundRect(ctx, -size*.08, size*.1, size*.16, size*.35, size*.04);
  ctx.fill();

  // Guard
  ctx.fillStyle = c+'99';
  roundRect(ctx, -size*.2, size*.05, size*.4, size*.08, size*.03);
  ctx.fill();

  // Blade body
  ctx.beginPath();
  ctx.moveTo(0, -size*.5);
  ctx.bezierCurveTo(size*.22, -size*.2, size*.18, size*.05, size*.04, size*.1);
  ctx.lineTo(-size*.04, size*.1);
  ctx.bezierCurveTo(-size*.18, size*.05, -size*.22, -size*.2, 0, -size*.5);
  ctx.closePath();

  const bGrad = ctx.createLinearGradient(-size*.2,0,size*.2,0);
  bGrad.addColorStop(0,c+'aa'); bGrad.addColorStop(.4,'#fff'); bGrad.addColorStop(.6,'#fff'); bGrad.addColorStop(1,c+'aa');
  ctx.fillStyle = bGrad;
  ctx.fill();

  // Neon edge
  ctx.strokeStyle = g; ctx.lineWidth = size*.025;
  ctx.shadowColor = g; ctx.shadowBlur = 12;
  ctx.stroke();

  // Rarity gems
  if(blade.rarity==='legendary') {
    for(let i=0;i<3;i++) {
      const gy = -size*.3 + i*size*.12;
      ctx.beginPath(); ctx.arc(0,gy,size*.035,0,Math.PI*2);
      const gemGrad = ctx.createRadialGradient(0,gy,0,0,gy,size*.035);
      gemGrad.addColorStop(0,'#fff'); gemGrad.addColorStop(1,c);
      ctx.fillStyle = gemGrad; ctx.shadowBlur=8; ctx.shadowColor=c; ctx.fill();
    }
  } else if(blade.rarity==='epic') {
    ctx.beginPath(); ctx.arc(0,-size*.25,size*.04,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.shadowBlur=10; ctx.shadowColor=c; ctx.fill();
  }

  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// Menu blade animation

// ========== SHOP ==========
function renderShop() {
  document.getElementById('shopCoinCount').textContent = state.coins;
  const grid = document.getElementById('bladeGrid');
  grid.innerHTML = '';
  BLADES.forEach(blade => {
    const owned = state.ownedBlades.includes(blade.id);
    const equipped = state.equippedBlade === blade.id;
    const card = document.createElement('div');
    card.className = 'blade-card' + (equipped?' equipped':'') + (owned?'':' locked');
    card.innerHTML = `
      <canvas class="blade-card-canvas" id="bc_${blade.id}" width="120" height="120"></canvas>
      <div class="blade-name">${blade.icon} ${blade.name}</div>
      <div class="blade-rarity rarity-${blade.rarity}">${blade.rarity.toUpperCase()}</div>
      <div class="blade-price">${owned ? (equipped?'✓ EQUIPPED':'TAP TO EQUIP') : '🪙 '+blade.price}</div>
      ${equipped?'<div class="blade-badge">ON</div>':''}
    `;
    card.onclick = () => handleBladeClick(blade);
    grid.appendChild(card);
    setTimeout(()=>{
      const bc = document.getElementById('bc_'+blade.id);
      if(bc) { const bctx=bc.getContext('2d'); drawBlade(bctx,blade,60,60,42); }
    },0);
  });
}

function handleBladeClick(blade) {
  if(state.equippedBlade===blade.id) return;
  if(state.ownedBlades.includes(blade.id)) {
    state.equippedBlade = blade.id; saveState(); renderShop(); return;
  }
  if(state.coins >= blade.price) {
    state.coins -= blade.price;
    state.ownedBlades.push(blade.id);
    state.equippedBlade = blade.id;
    saveState(); renderShop();
    document.getElementById('shopCoinCount').textContent = state.coins;
    spawnFloatText(window.innerWidth/2-60, window.innerHeight/2, '⚔️ UNLOCKED!', blade.color);
  } else {
    spawnFloatText(window.innerWidth/2-60, window.innerHeight/2, '❌ NOT ENOUGH COINS', '#ff3366');
  }
}

// ========== CASES ==========
function renderCases() {
  document.getElementById('casesCoinCount').textContent = state.coins;
  const grid = document.getElementById('caseGrid');
  grid.innerHTML = '';
  CASES.forEach(c => {
    const card = document.createElement('div');
    card.className = 'case-card';
    card.style.borderColor = c.color+'44';
    card.style.boxShadow = `0 0 20px ${c.color}22`;
    card.innerHTML = `
      <div class="case-icon" style="color:${c.color}">${c.icon}</div>
      <div class="case-info">
        <h3>${c.name}</h3>
        <p>Рідкість: ${c.pool.join(', ')}</p>
      </div>
      <div class="case-price"><span>🪙 ${c.price}</span></div>
    `;
    card.onclick = ()=>openCase(c);
    grid.appendChild(card);
  });
}

function openCase(caseData) {
  if(state.coins < caseData.price) {
    spawnFloatText(window.innerWidth/2-80, window.innerHeight/2, '❌ НЕ ВИСТАЧАЄ МОНЕТ', '#ff3366');
    return;
  }
  state.coins -= caseData.price;
  // pick rarity then blade
  const rarities = caseData.pool;
  const weights = rarities.map(r => ({common:50,uncommon:30,rare:15,epic:8,legendary:3}[r]||10));
  const total = weights.reduce((a,b)=>a+b,0);
  let roll = Math.random()*total;
  let pickedRarity = rarities[0];
  for(let i=0;i<rarities.length;i++) { roll-=weights[i]; if(roll<=0){pickedRarity=rarities[i];break;} }

  const pool = BLADES.filter(b=>b.rarity===pickedRarity);
  const blade = pool[Math.floor(Math.random()*pool.length)];

  if(!state.ownedBlades.includes(blade.id)) state.ownedBlades.push(blade.id);
  saveState();
  showCaseReveal(blade);
  document.getElementById('casesCoinCount').textContent = state.coins;
}

function showCaseReveal(blade) {
  document.getElementById('caseOpen').classList.remove('hidden');
  document.getElementById('revealName').textContent = blade.icon+' '+blade.name;
  document.getElementById('revealName').style.color = blade.color;
  document.getElementById('revealRarity').textContent = blade.rarity.toUpperCase();
  document.getElementById('revealRarity').style.color = RARITY_COLOR[blade.rarity];

  const rc = document.getElementById('revealCanvas');
  const rctx = rc.getContext('2d');
  let t=0;
  function animReveal() {
    rctx.clearRect(0,0,240,240);
    drawBlade(rctx, blade, 120, 120, 100, t);
    t+=16;
    if(!document.getElementById('caseOpen').classList.contains('hidden'))
      requestAnimationFrame(animReveal);
  }
  animReveal();
}

function closeCaseReveal() {
  document.getElementById('caseOpen').classList.add('hidden');
}

// ==================== GAME ENGINE ====================
let gCanvas, gCtx, animId;
let fruits=[], particles=[], trails=[], slashLine=[];
let score=0, lives=6, sessionCoins=0, slicedCount=0, maxCombo=0;
let comboCount=0, comboTimer=null;
let isPointerDown=false, lastPointer={x:0,y:0};
let gamePaused=false, gameRunning=false;
let spawnTimer=0, difficulty=1;
let bgParticles=[];

const FRUIT_TYPES = [
  {name:'watermelon', color:'#ff4444', inner:'#ff8888', icon:'🍉', score:1, radius:32, coins:1},
  {name:'orange',     color:'#ff8800', inner:'#ffaa44', icon:'🍊', score:1, radius:26, coins:1},
  {name:'apple',      color:'#ff2255', inner:'#ff6688', icon:'🍎', score:2, radius:26, coins:1},
  {name:'pineapple',  color:'#ffcc00', inner:'#ffee44', icon:'🍍', score:2, radius:30, coins:2},
  {name:'mango',      color:'#ff9900', inner:'#ffcc44', icon:'🥭', score:3, radius:28, coins:2},
  {name:'lemon',      color:'#ffee00', inner:'#ffff88', icon:'🍋', score:1, radius:22, coins:1},
  {name:'grape',      color:'#aa44ff', inner:'#cc88ff', icon:'🍇', score:2, radius:24, coins:2},
  {name:'bomb',       color:'#222',    inner:'#555',    icon:'💣', score:-10,radius:28, coins:0, isBomb:true},
  {name:'star',       color:'#ffd700', inner:'#fff',    icon:'⭐', score:5, radius:28, coins:5, isBonus:true},
];

function initGame() {
  gCanvas = document.getElementById('gameCanvas');
  gCtx = gCanvas.getContext('2d', {alpha:false});
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  setupBgParticles();
}

function resizeCanvas() {
  if(!gCanvas) return;
  gCanvas.width = window.innerWidth;
  gCanvas.height = window.innerHeight;
}

function setupBgParticles() {
  bgParticles = [];
  for(let i=0;i<40;i++) {
    bgParticles.push({
      x: Math.random()*window.innerWidth,
      y: Math.random()*window.innerHeight,
      r: Math.random()*1.5+.5,
      speed: Math.random()*.3+.1,
      opacity: Math.random()*.4+.1,
    });
  }
}

function startGame() {
  showScreen('game');
  if(!gCanvas) initGame();
  resizeCanvas();
  fruits=[]; particles=[]; trails=[]; slashLine=[];
  score=0; lives=6; sessionCoins=0; slicedCount=0; maxCombo=0;
  comboCount=0; spawnTimer=0; difficulty=1; gamePaused=false; gameRunning=true;
  updateHUD();
  setupTouchEvents();
  if(animId) cancelAnimationFrame(animId);
  gameLoop();
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('sessionCoins').textContent = sessionCoins;
  const lv = document.getElementById('livesDisplay');
  lv.innerHTML = '';
  // 6 напів-сердець = 3 повних. Показуємо 3 серця з станом: full / half / empty
  for(let i=0;i<3;i++) {
    const halfsFilled = Math.max(0, lives - i*2); // скільки половинок лишилось для цього серця
    const h = document.createElement('div');
    h.className = 'heart';
    h.style.transition = 'all .3s';
    if(halfsFilled >= 2)      h.textContent = '❤️';
    else if(halfsFilled === 1) h.textContent = '💔';
    else                       { h.textContent = '🖤'; h.style.opacity='.25'; h.style.transform='scale(.7)'; }
    lv.appendChild(h);
  }
}

let pointer = {x:0,y:0};
let lastSlicePos = null;

function setupTouchEvents() {
  gCanvas.removeEventListener('touchstart', onTS);
  gCanvas.removeEventListener('touchmove', onTM);
  gCanvas.removeEventListener('touchend', onTE);
  gCanvas.removeEventListener('mousedown', onMD);
  gCanvas.removeEventListener('mousemove', onMM);
  gCanvas.removeEventListener('mouseup', onMU);

  gCanvas.addEventListener('touchstart', onTS, {passive:false});
  gCanvas.addEventListener('touchmove', onTM, {passive:false});
  gCanvas.addEventListener('touchend', onTE, {passive:false});
  gCanvas.addEventListener('mousedown', onMD);
  gCanvas.addEventListener('mousemove', onMM);
  gCanvas.addEventListener('mouseup', onMU);
}

function getXY(e) {
  if(e.touches) { return {x:e.touches[0].clientX, y:e.touches[0].clientY}; }
  return {x:e.clientX, y:e.clientY};
}

function onTS(e) { e.preventDefault(); isPointerDown=true; const p=getXY(e); pointer=p; lastSlicePos=p; slashLine=[p]; }
function onTM(e) { e.preventDefault(); if(!isPointerDown) return; sliceMove(e); }
function onTE(e) { isPointerDown=false; slashLine=[]; lastSlicePos=null; }
function onMD(e) { isPointerDown=true; const p=getXY(e); pointer=p; lastSlicePos=p; slashLine=[p]; }
function onMM(e) { if(!isPointerDown) return; sliceMove(e); }
function onMU(e) { isPointerDown=false; slashLine=[]; lastSlicePos=null; }

function sliceMove(e) {
  const p = getXY(e);
  pointer = p;
  if(lastSlicePos) {
    const blade = getBladeData(state.equippedBlade);
    trails.push({
      x1:lastSlicePos.x, y1:lastSlicePos.y,
      x2:p.x, y2:p.y,
      alpha:1, width:4, color:blade.color, glow:blade.glow,
      effect:blade.effect, trail:blade.trail
    });
    checkSlice(lastSlicePos, p);
  }
  slashLine.push(p);
  if(slashLine.length>20) slashLine.shift();
  lastSlicePos = p;
}

function checkSlice(a, b) {
  if(!gameRunning || gamePaused) return;
  for(let i=fruits.length-1;i>=0;i--) {
    const f = fruits[i];
    if(f.sliced) continue;
    if(lineCircleIntersect(a.x,a.y,b.x,b.y,f.x,f.y,f.radius)) {
      sliceFruit(f, i, b.x, b.y);
    }
  }
}

function lineCircleIntersect(x1,y1,x2,y2,cx,cy,r) {
  const dx=x2-x1, dy=y2-y1;
  const fx=x1-cx, fy=y1-cy;
  const a=dx*dx+dy*dy;
  const b=2*(fx*dx+fy*dy);
  const c=fx*fx+fy*fy-r*r;
  let disc=b*b-4*a*c;
  if(disc<0) return false;
  disc=Math.sqrt(disc);
  const t1=(-b-disc)/(2*a), t2=(-b+disc)/(2*a);
  return (t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

function sliceFruit(f, idx, sx, sy) {
  f.sliced = true;
  fruits.splice(idx,1);

  if(f.isBomb) {
    // Бомба знімає пів серця (але мін 1 якщо лишилось 1)
    lives = lives > 1 ? lives - 1 : 0;
    spawnParticles(f.x,f.y,'#ff4400',25,'boom');
    // Показати попередження
    const warn = document.createElement('div');
    warn.className = 'combo-flash';
    warn.style.color='#ff4400'; warn.style.textShadow='0 0 20px #ff4400';
    warn.textContent='💣 -½ HP!';
    document.body.appendChild(warn);
    setTimeout(()=>warn.remove(), 750);
    updateHUD();
    comboCount=0;
    if(lives<=0) { setTimeout(endGame,400); }
    return;
  }

  score += f.score * Math.max(1, comboCount);
  slicedCount++;
  comboCount++;
  if(comboCount>maxCombo) maxCombo=comboCount;
  if(comboTimer) clearTimeout(comboTimer);
  comboTimer = setTimeout(()=>comboCount=0, 1200);

  const blade = getBladeData(state.equippedBlade);
  const coinEarn = f.coins || 1;
  sessionCoins += coinEarn;
  updateHUD();

  spawnParticles(f.x, f.y, f.color, 15, blade.effect);
  spawnHalves(f);

  // Score popup
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.style.left = (f.x-20)+'px'; pop.style.top = (f.y-20)+'px';
  pop.style.color = comboCount>=3 ? blade.color : '#fff';
  pop.textContent = (comboCount>=3?'x'+comboCount+' ':'')+'+'+(f.score*(comboCount>=3?comboCount:1));
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(), 900);

  if(comboCount>=3) showCombo(comboCount, blade.color);
  if(f.isBonus) spawnFloatText(f.x, f.y-40, '⭐ BONUS!', '#ffd700');
}

function showCombo(count, color) {
  const el = document.createElement('div');
  el.className = 'combo-flash';
  el.style.color = color; el.style.textShadow=`0 0 20px ${color}`;
  el.textContent = count+'x COMBO!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 750);
}

function spawnHalves(f) {
  const ang = Math.random()*Math.PI;
  for(let i=0;i<2;i++) {
    const side = i===0?1:-1;
    particles.push({
      type:'half', x:f.x, y:f.y,
      vx:Math.cos(ang)*side*3+Math.random()*2-1,
      vy:-(Math.random()*4+3),
      vy2:0, gravity:0.3,
      color:f.color, inner:f.inner, r:f.radius*.7,
      alpha:1, rot:Math.random()*Math.PI, rotSpeed:(Math.random()-.5)*.15,
      life:60
    });
  }
}

function spawnParticles(x,y,color,count,effect) {
  for(let i=0;i<count;i++) {
    const ang = (Math.PI*2*i)/count + Math.random()*.5;
    const spd = Math.random()*5+2;
    particles.push({
      type:'spark', x, y,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      gravity:0.15, color,
      alpha:1, r:Math.random()*3+1,
      life:40+Math.random()*20,
      effect
    });
  }
  // juice splat
  for(let i=0;i<8;i++) {
    particles.push({
      type:'splat', x, y,
      vx:(Math.random()-0.5)*8, vy:(Math.random()-2)*5,
      gravity:.25, color,
      alpha:.8, r:Math.random()*4+2,
      life:30
    });
  }
}

function spawnOneFruit() {
  const W = gCanvas.width, H = gCanvas.height;
  const types = FRUIT_TYPES.filter(t => !t.isBomb && !t.isBonus);
  const bombChance = Math.min(.07 + difficulty * .008, .15);
  let ft;
  if (Math.random() < bombChance) {
    ft = FRUIT_TYPES.find(t => t.isBomb);
  } else if (Math.random() < .06) {
    ft = FRUIT_TYPES.find(t => t.isBonus);
  } else {
    ft = types[Math.floor(Math.random() * types.length)];
  }

  const gravity = 0.04;
  // Апекс: фрукт долетить до 20-45% висоти екрану
  const targetApex = H * (0.20 + Math.random() * 0.25);
  const dist = H - targetApex;
  const speed = Math.sqrt(2 * gravity * dist);

  // Обмежуємо vx щоб фрукт не вилетів за бік
  const halfFlight = speed / gravity;
  const maxVx = Math.min((W * 0.35 - ft.radius) / halfFlight, 1.0);
  const vx = (Math.random() - 0.5) * 2 * maxVx;

  // X з урахуванням дрейфу
  const drift = vx * halfFlight;
  const minX = ft.radius + Math.max(0, -drift);
  const maxX = W - ft.radius - Math.max(0, drift);
  const x = minX + Math.random() * Math.max(10, maxX - minX);

  fruits.push({
    ...ft,
    x, y: H + ft.radius,
    vx, vy: -speed,
    gravity,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
    sliced: false, offscreen: false,
    t: 0, glowPhase: Math.random() * Math.PI * 2
  });
}

function spawnFruit() {
  // Іноді хвиля з 2-3 фруктів з невеликою затримкою
  const count = Math.random() < 0.35 ? (Math.random() < 0.4 ? 3 : 2) : 1;
  spawnOneFruit();
  for (let i = 1; i < count; i++) {
    setTimeout(spawnOneFruit, i * 260);
  }
}

function endGame() {
  gameRunning=false;
  cancelAnimationFrame(animId);
  state.coins += sessionCoins;
  if(score>state.highScore) state.highScore=score;
  saveState();
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalFruits').textContent=slicedCount;
  document.getElementById('finalCombo').textContent=maxCombo;
  document.getElementById('earnedCoins').textContent=sessionCoins;
  showScreen('gameover');
}

function togglePause() {
  gamePaused=!gamePaused;
  document.querySelector('.pause-btn').textContent=gamePaused?'▶':'⏸';
  if(!gamePaused) gameLoop();
}

let lastTime=0;
function gameLoop(ts=0) {
  if(!gameRunning||gamePaused) return;
  animId=requestAnimationFrame(gameLoop);
  const dt=Math.min(ts-lastTime, 50); lastTime=ts;

  updateGame(dt);
  renderGame();
}

function updateGame(dt) {
  spawnTimer+=dt;
  const interval = Math.max(1400 - difficulty * 60, 600);
  if(spawnTimer>interval) { spawnFruit(); spawnTimer=0; }
  difficulty = 1 + score/80;

  // Update fruits
  for(let i=fruits.length-1;i>=0;i--) {
    const f=fruits[i];
    f.vy+=f.gravity; f.x+=f.vx; f.y+=f.vy;
    f.rot+=f.rotSpeed; f.t++;
    if(f.y > gCanvas.height+80) {
      if(!f.isBomb && !f.sliced) { lives -= 2; updateHUD(); if(lives<=0)endGame(); }
      fruits.splice(i,1);
    }
  }

  // Update particles
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.vy+=p.gravity; p.x+=p.vx; p.y+=p.vy;
    p.alpha-=1/p.life; p.life--;
    if(p.type==='half'){p.rot+=p.rotSpeed;}
    if(p.life<=0||p.alpha<=0) particles.splice(i,1);
  }

  // Update trails
  for(let i=trails.length-1;i>=0;i--) {
    trails[i].alpha-=.06;
    if(trails[i].alpha<=0) trails.splice(i,1);
  }

  // Bg particles
  bgParticles.forEach(p=>{ p.y-=p.speed; if(p.y<0){p.y=gCanvas.height;p.x=Math.random()*gCanvas.width;} });
}

function renderGame() {
  const ctx=gCtx, W=gCanvas.width, H=gCanvas.height;

  // Background
  ctx.fillStyle='#050510';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(0,245,255,.04)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // BG particles
  bgParticles.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,245,255,${p.opacity})`; ctx.fill();
  });

  // Trails
  trails.forEach(t=>{
    ctx.save();
    ctx.globalAlpha=t.alpha;
    ctx.strokeStyle=t.color; ctx.lineWidth=t.width*t.alpha;
    ctx.shadowColor=t.glow; ctx.shadowBlur=18;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke();
    // Secondary glow
    ctx.strokeStyle='#fff'; ctx.lineWidth=t.width*t.alpha*.4; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke();
    ctx.restore();
  });

  // Slash line
  if(isPointerDown && slashLine.length>1) {
    const blade=getBladeData(state.equippedBlade);
    ctx.save();
    for(let i=1;i<slashLine.length;i++) {
      const a=(i/slashLine.length);
      ctx.globalAlpha=a*.7;
      ctx.strokeStyle=blade.color; ctx.lineWidth=3*a;
      ctx.shadowColor=blade.glow; ctx.shadowBlur=15;
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath();
      ctx.moveTo(slashLine[i-1].x,slashLine[i-1].y);
      ctx.lineTo(slashLine[i].x,slashLine[i].y);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Fruits
  fruits.forEach(f=>{
    ctx.save();
    ctx.translate(f.x,f.y);
    ctx.rotate(f.rot);
    const gp=Math.sin(f.t*.05+f.glowPhase)*.5+.5;

    if(f.isBomb) {
      // Bomb
      ctx.shadowColor='#ff4400'; ctx.shadowBlur=10+gp*10;
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(0,0,f.radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ff4400'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#ff4400'; ctx.font='bold '+(f.radius*1.2)+'px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💣',0,0);
    } else {
      // Fruit glow
      const glow=ctx.createRadialGradient(0,0,0,0,0,f.radius*1.3);
      glow.addColorStop(0,f.color+'44'); glow.addColorStop(1,'transparent');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,f.radius*1.3,0,Math.PI*2); ctx.fill();

      // Body
      const grad=ctx.createRadialGradient(-f.radius*.3,-f.radius*.3,0,0,0,f.radius);
      grad.addColorStop(0,'#fff'); grad.addColorStop(.3,f.inner); grad.addColorStop(1,f.color);
      ctx.shadowColor=f.color; ctx.shadowBlur=15+gp*8;
      ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(0,0,f.radius,0,Math.PI*2); ctx.fill();

      // Glass shine
      ctx.fillStyle='rgba(255,255,255,.3)';
      ctx.beginPath(); ctx.ellipse(-f.radius*.25,-f.radius*.3,f.radius*.3,f.radius*.18,-0.5,0,Math.PI*2); ctx.fill();

      // Outline
      ctx.strokeStyle=f.color+'aa'; ctx.lineWidth=1.5; ctx.stroke();

      // Icon emoji
      ctx.shadowBlur=0; ctx.fillStyle='#fff';
      ctx.font='bold '+(f.radius*1.1)+'px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(f.isBonus?'⭐':f.icon,0,1);
    }
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.alpha;
    if(p.type==='half') {
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      const g=ctx.createRadialGradient(0,0,0,0,0,p.r);
      g.addColorStop(0,p.inner||p.color); g.addColorStop(1,p.color+'66');
      ctx.fillStyle=g; ctx.shadowColor=p.color; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI); ctx.fill();
    } else if(p.type==='splat') {
      ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.alpha,0,Math.PI*2); ctx.fill();
      if(p.effect==='sparks'||p.effect==='electric') {
        ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.globalAlpha=p.alpha*.5;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*3,p.y-p.vy*3); ctx.stroke();
      }
    }
    ctx.restore();
  });
}

// ==================== INIT ====================
showScreen('menu');
</script>
</body>
